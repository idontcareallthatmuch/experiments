<!DOCTYPE html>
<html>
    <head>
        <title>Ruleset styles</title>
        <style>
            h1, h2, h3, h4 {
                color: green;
                font-size: 30px;
            }
            h1{
                color: coral;
                color: rgba(201, 63 ,41, 0.723);
            }
            #mr-jones{
                color: burlywood
            }
            .important{
                    color :red;
            }
            #the-one{
                color: blue
            }
            .uppercase{
                text-transform: uppercase;
            }
        </style>
    </head>
    <body>
        <h1>
            Heading <span id="the-one">One</span>
        </h1>
        <h2 class="important uppercase">Heading 2</h2>
        <h3 class="important uppercase"id="mr-jones">Heading 3</h3>
        <h4>Heading 4</h4>
        <h1>Heading 1</h1>
        <h2>Heading 2</h2>
        <h3>Heading 3</h3>
        <h4>Heading 4</h4>
    </body>
</html>
